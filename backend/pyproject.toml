[project]
name = "backend"
version = "0.1.0"
description = "Community data scrapers (Douban, WeRead, Flomo) using Playwright"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.136.0",
    "uvicorn>=0.44.0",
    "playwright>=1.58.0",
    "pydantic>=2.13.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["community"]
