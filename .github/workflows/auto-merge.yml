name: Auto Merge (Owner PR)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check:
    if: github.event.pull_request.user.login == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install main dependencies
        run: pip install beautifulsoup4 requests loguru python-dotenv pydantic

      - name: Syntax check - main project
        run: python -m py_compile main.py && python -m py_compile function/spider.py && python -m py_compile function/glo.py

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Syntax check - feature module
        working-directory: src/feature
        run: uv sync && uv run python -m py_compile feature/__main__.py

  auto-merge:
    needs: check
    if: github.event.pull_request.user.login == github.repository_owner
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Auto merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --subject "${{ github.event.pull_request.title }}" --body ""
